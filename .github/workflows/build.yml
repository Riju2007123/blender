name: Build Blender

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Disable Git LFS smudge
        run: git config --global lfs.smudge "git-lfs smudge --skip -- %f"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 0

      - name: Fetch Blender PR
        shell: cmd
        run: |
          git fetch https://projects.blender.org/blender/blender.git pull/153077/head:pr153077
          git checkout pr153077

      - name: Install Git LFS
        run: git lfs install

      - name: Download Blender dependencies
        shell: cmd
        run: build_files\utils\make_update.bat

      - name: Build Blender
        shell: cmd
        run: build_files\windows\make.bat -j 2

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: blender-build
          path: build_windows*
