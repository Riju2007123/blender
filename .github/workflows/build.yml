name: Build Blender PR 153077

on:
workflow_dispatch:

jobs:
build:
runs-on: windows-latest

```
env:
  GIT_LFS_SKIP_SMUDGE: 1

steps:

  - name: Install Git LFS
    run: git lfs install --skip-smudge

  - name: Clone Blender repository
    shell: cmd
    run: |
      git clone --depth 1 https://projects.blender.org/blender/blender.git
      cd blender
      git remote add pr https://projects.blender.org/blender/blender.git
      git fetch pr pull/153077/head:pr153077
      git checkout pr153077

  - name: Download Blender libraries
    shell: cmd
    run: |
      cd blender
      build_files\utils\make_update.bat

  - name: Build Blender
    shell: cmd
    run: |
      cd blender
      build_files\windows\make.bat -j 2

  - name: Upload build
    uses: actions/upload-artifact@v4
    with:
      name: blender-build
      path: blender/build_windows*
```
