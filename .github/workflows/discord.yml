name: Discord Notify

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Discord
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content": "🚀 New Release: ${{ github.event.release.name }}\n${{ github.event.release.html_url }}"}' \
          ${{ secrets.DISCORD_WEBHOOK }}
