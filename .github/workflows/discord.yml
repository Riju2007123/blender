name: Discord Notify

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Discord
  run: |
    BODY="${{ github.event.release.body }}"
    BODY_ESCAPED=$(echo "$BODY" | sed ':a;N;$!ba;s/\n/\\n/g' | sed 's/"/\\"/g')

    curl -H "Content-Type: application/json" \
    -d "{\"content\": \"🚀 **${{ github.event.release.name }}**\n📦 Version: ${{ github.event.release.tag_name }}\n\n📝 Changes:\n$BODY_ESCAPED\n\n🔗 ${{ github.event.release.html_url }}\"}" \
    "${{ secrets.DISCORD_WEBHOOK }}"
