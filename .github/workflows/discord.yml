name: Discord Notify

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Discord
        run: |
          BODY="${{ github.event.release.body }}"

          # take only first 5 lines (clean preview)
          PREVIEW=$(echo "$BODY" | head -n 5 | sed ':a;N;$!ba;s/\n/\\n/g' | sed 's/"/\\"/g')

          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"🚀 **${{ github.event.release.name }}**\n📦 Version: ${{ github.event.release.tag_name }}\n\n📝 Changes (Preview):\n$PREVIEW\n\n🔗 Full notes: ${{ github.event.release.html_url }}\"}" \
          "${{ secrets.DISCORD_WEBHOOK }}"
